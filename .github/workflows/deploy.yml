name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_HOST != '' }}
    steps:
      - name: Trigger remote deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ vars.DEPLOY_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -e
            sudo /srv/linesia/infra/deploy/deploy-website.sh
